<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — STA-SYSTEM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              background:linear-gradient(to right,#0f172a,#1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: #ffffff;
            border: 0.5px solid rgba(0,0,0,0.12);
            border-radius: 12px;
            padding: 2rem 2.25rem;
            width: 100%;
            max-width: 380px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: #e6f1fb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .brand-icon i {
            font-size: 22px;
            color: #185fa5;
        }

        .login-title {
            font-size: 20px;
            font-weight: 500;
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 13px;
            color: #666;
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .field-wrap {
            margin-bottom: 1rem;
            position: relative;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .field-icon {
            position: absolute;
            left: 10px;
            bottom: 9px;
            font-size: 16px;
            color: #888;
            pointer-events: none;
        }

        .field-wrap input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            border: 0.5px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            background: #fff;
            outline: none;
            transition: border-color 0.15s;
        }

        .field-wrap input:focus {
            border-color: #378add;
            box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
        }

        /* Style pour les champs Django générés automatiquement */
        .field-wrap input[type="text"],
        .field-wrap input[type="password"] {
            width: 100%;
            padding: 8px 12px 8px 34px;
            border: 0.5px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            padding: 9px;
            background: #185fa5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.15s;
        }

        .btn-login:hover { opacity: 0.88; }
        .btn-login:active { transform: scale(0.98); }

        .divider {
            border: none;
            border-top: 0.5px solid rgba(0,0,0,0.1);
            margin: 1.25rem 0;
        }

        .register-text {
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .register-text a {
            color: #185fa5;
            text-decoration: none;
        }

        .register-text a:hover { text-decoration: underline; }

        .error-box {
            background: #fcebeb;
            border: 0.5px solid #f09595;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #a32d2d;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="login-card">

  
    <h1 class="login-title">STA-SYSTEM</h1>
    <p class="login-sub">Système de Traçabilité d'Activité</p>

    <form method="post">
        {% csrf_token %}

        <div class="field-wrap">
            <label class="field-label" for="id_username">Identifiant</label>
            <i class="ti ti-user field-icon"></i>
            {{ form.username }}
        </div>

        <div class="field-wrap">
            <label class="field-label" for="id_password">Mot de passe</label>
            <i class="ti ti-lock field-icon"></i>
            {{ form.password }}
        </div>

        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    {% if form.errors %}
    <div class="error-box">
        <i class="ti ti-alert-circle"></i>
        Identifiants incorrects. Veuillez réessayer.
    </div>
    {% endif %}

    <hr class="divider">

    <p class="register-text">
        Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
    </p>

</div>

</body>
</html>
