<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Inscription</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#0f172a,#1e293b);
            font-family:Arial;
        }

        .register-card{
            width:450px;
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .form-control{
            height:45px;
            border-radius:8px;
        }

        button{
            height:45px;
            border:none;
            border-radius:8px;
            background:#0d6efd;
            color:white;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="register-card">

    <h1>STA-SYSTEM</h1>

    <p class="text-muted">
        Système de Traçabilité d'Activité
    </p>

    <h2 class="mb-4">Créer un compte</h2>

    <form method="POST">

    {% csrf_token %}

    {{ form.username }}

    {{ form.email }}

    {{ form.password1 }}

    {{ form.password2 }}

    <button type="submit">
        S'inscrire
    </button>

</form>

    <p class="mt-4">
        Déjà un compte ?
        <a href="{% url 'login' %}">
            Se connecter
        </a>
    </p>

</div>

</body>
</html>
