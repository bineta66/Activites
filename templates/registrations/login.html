<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Connexion | STA SYSTEM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial;
        }

        .card-login{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            margin-bottom:20px;
            font-weight:bold;
        }

        .btn-login{
            background:#2563eb;
            color:white;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="card-login">

        <h3 class="title">Connexion STA</h3>

        <form method="POST">

            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="mb-3">

                <label>Nom utilisateur</label>

                {{ form.username }}

            </div>

            <div class="mb-3">

                <label>Mot de passe</label>

                {{ form.password }}

            </div>

            <button class="btn-login">
                Se connecter
            </button>

        </form>

    </div>

</body>

</html>
